set -g default-shell "/opt/homebrew/bin/fish"
set -g default-command "/opt/homebrew/bin/fish --login"

set -g prefix C-b
unbind C-a
bind-key C-b send-prefix

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g escape-time 10
set -g repeat-time 500
set -g mouse on
set -g focus-events on
set -g mode-keys vi

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"
bind-key g new-window -c "#{pane_current_path}" lazygit

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -n M-1 select-pane -t:.1
bind-key -n M-2 select-pane -t:.2
bind-key -n M-3 select-pane -t:.3
bind-key -n M-4 select-pane -t:.4
bind-key -n M-5 select-pane -t:.5
bind-key -n M-6 select-pane -t:.6
bind-key -n M-7 select-pane -t:.7
bind-key -n M-8 select-pane -t:.8
bind-key -n M-9 select-pane -t:.9

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour5"
set -g message-style "fg=colour0,bg=colour4"
set -g status-style "fg=colour8,bg=default"
set -g status-interval 5
set -g status-left-length 24
set -g status-right-length 48
set -g status-left "#[fg=colour4,bold] #S #[default]"
set -g window-status-format "#[fg=colour8]#I:#W"
set -g window-status-current-format "#[fg=colour5,bold]#I:#W"
set -g status-right "#[fg=colour8]#{b:pane_current_path} %H:%M"
